spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop  # creates tables on startup, drops on shutdown
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080